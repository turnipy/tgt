name: CD

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        run: gh release create ${{ github.ref_name }} -R $REPO --generate-notes

  build:
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: tgt
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: tgt
          - os: macos-13
            target: x86_64-apple-darwin
            binary: tgt
          - os: macos-14
            target: aarch64-apple-darwin
            binary: tgt
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tgt.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pkg-config build-essential \
            libc++-dev libc++abi-dev cmake \
            libasound2-dev \
            autoconf automake libtool
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool
      - name: Build release binary
        run: cargo build --release
      - name: Package binary
        run: |
          cp "target/release/${{ matrix.binary }}" "${{ matrix.binary }}"
          tar czf "tgt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"
          rm "${{ matrix.binary }}"
      - name: Upload release asset
        run: gh release upload "${{ github.ref_name }}" "tgt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" --clobber -R "$REPO"

  publish_crates:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish to crates.io
        run: |
          cargo login ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --package tgt
# --no-verify
